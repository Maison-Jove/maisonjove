<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script type="text/javascript">
      /*
        Recupera la ruta original guardada por public/404.html
        y la restaura antes de que React Router monte la app.
      */

      (function () {
        var redirectPath = sessionStorage.getItem("mj_redirect_path");

        if (redirectPath) {
          sessionStorage.removeItem("mj_redirect_path");

          if (redirectPath !== window.location.pathname) {
            window.history.replaceState(null, "", redirectPath);
          }
        }
      })();
    </script>
